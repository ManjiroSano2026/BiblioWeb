<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Bibliothèque</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .btn { background-color: #3498db; color: white; padding: 15px; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.2s; border: none; cursor: pointer; }
        .btn:hover { background-color: #2980b9; }
        .btn-consult { background-color: #2ecc71; }
        .btn-consult:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 Système de Gestion de Bibliothèque</h1>
        <p>Bienvenue dans votre application web.</p>
        
        <div class="grid">
            <a <a href="/ajouter_livre" class="btn">➕ Ajouter un Livre</a>
            <a href="/livres" class="btn btn-consult">📋 Liste des Livres</a>
            <a href="/inscrire_etudiant" class="btn">👤 Inscrire un Étudiant</a>
            <a href="/etudiants" class="btn btn-consult">📋 Liste des Étudiants</a>
            <a href="/emprunter" class="btn" style="background-color: #e67e22;">📖 Faire un Emprunt</a>
            <a href="/historique" class="btn" style="background-color: #9b59b6;">🔍 Historique Étudiant</a>
        </div>
    </div>

</body>
</html>

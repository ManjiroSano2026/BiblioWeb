<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un Étudiant</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; padding: 20px; }
        .container { max-width: 500px; margin: 30px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Modifier l'Étudiant : {{ etudiant[0] }}</h1>
        <form action="/modifier_etudiant/{{ etudiant[0] }}" method="POST">
            <div class="form-group">
                <label>Nom :</label>
                <input type="text" name="nom" value="{{ etudiant[1] }}" required>
            </div>
            <div class="form-group">
                <label>Prénom :</label>
                <input type="text" name="prenom" value="{{ etudiant[2] }}" required>
            </div>
            <div class="form-group">
                <label>Filière :</label>
                <input type="text" name="filiere" value="{{ etudiant[3] }}" required>
            </div>
            <div class="form-group">
                <label>Niveau :</label>
                <select name="niveau">
                    <option value="Licence 1" {% if etudiant[4] == 'Licence 1' %}selected{% endif %}>Licence 1</option>
                    <option value="Licence 2" {% if etudiant[4] == 'Licence 2' %}selected{% endif %}>Licence 2</option>
                    <option value="Licence 3" {% if etudiant[4] == 'Licence 3' %}selected{% endif %}>Licence 3</option>
                    <option value="Master" {% if etudiant[4] == 'Master' %}selected{% endif %}>Master</option>
                </select>
            </div>
            <div class="form-group">
                <label>Téléphone :</label>
                <input type="text" name="telephone" value="{{ etudiant[5] }}" required>
            </div>
            <button type="submit" class="btn-submit">💾 Enregistrer les modifications</button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enregistrer un Emprunt</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; padding: 20px; }
        .container { max-width: 500px; margin: 30px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input[type="text"], input[type="date"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background-color: #e67e22; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-submit:hover { background-color: #d35400; }
        .btn-retour { display: inline-block; margin-bottom: 20px; padding: 10px 15px; background-color: #34495e; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <a href="/" class="btn-retour">⬅️ Retour à l'Accueil</a>
        <h1>📖 Enregistrer un Prêt</h1>
        
        <form action="/emprunter" method="POST">
            <div class="form-group">
                <label for="id_carte">Numéro de Carte Étudiant :</label>
                <input type="text" id="id_carte" name="id_carte" required>
            </div>
            <div class="form-group">
                <label for="id_livre">Code du Livre (Ex: L001) :</label>
                <input type="text" id="id_livre" name="id_livre" required>
            </div>
            <div class="form-group">
                <label for="date_sortie">Date de sortie :</label>
                <input type="date" id="date_sortie" name="date_sortie" required>
            </div>
            <div class="form-group">
                <label for="date_rendu">Date de retour prévue :</label>
                <input type="date" id="date_rendu" name="date_rendu" required>
            </div>
            <button type="submit" class="btn-submit">🚀 Valider l'Emprunt</button>
        </form>
    </div>

</body>
</html>

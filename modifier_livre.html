<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un Livre</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; padding: 20px; }
        .container { max-width: 500px; margin: 30px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Modifier le Livre : {{ livre[0] }}</h1>
        <form action="/modifier_livre/{{ livre[0] }}" method="POST">
            <div class="form-group">
                <label>Titre :</label>
                <input type="text" name="titre" value="{{ livre[1] }}" required>
            </div>
            <div class="form-group">
                <label>Auteur :</label>
                <input type="text" name="auteur" value="{{ livre[2] }}" required>
            </div>
            <div class="form-group">
                <label>Année :</label>
                <input type="number" name="annee" value="{{ livre[3] }}" required>
            </div>
            <div class="form-group">
                <label>Quantité Totale :</label>
                <input type="number" name="quantite_totale" value="{{ livre[4] }}" required>
            </div>
            <div class="form-group">
                <label>Quantité Disponible :</label>
                <input type="number" name="quantite_dispo" value="{{ livre[5] }}" required>
            </div>
            <div class="form-group">
                <label>Domaine :</label>
                <input type="text" name="domaine" value="{{ livre[6] }}" required>
            </div>
            <div class="form-group">
                <label>Emplacement :</label>
                <input type="text" name="emplacement" value="{{ livre[7] }}" required>
            </div>
            <button type="submit" class="btn-submit">💾 Enregistrer les modifications</button>
        </form>
    </div>
</body>
</html>
